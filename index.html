<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>冷凍在庫システム</title>
<style>
  body{font-family:'Hiragino Sans','Yu Gothic',sans-serif;background:#f0f2f5;color:#1a1a2e;margin:0;padding:0;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .container{max-width:420px;width:100%;padding:20px;}
  h1{color:#1a3a6b;font-size:22px;margin-bottom:24px;text-align:center;}
  .app-block{background:#fff;border-radius:16px;padding:18px;margin-bottom:16px;box-shadow:0 2px 12px rgba(26,58,107,0.10);border-left:5px solid #1a3a6b;}
  .app-link{display:block;text-decoration:none;color:#1a1a2e;font-weight:700;font-size:18px;}
  .app-link .sub{font-size:12px;color:#6b7a99;font-weight:500;margin-top:4px;}
  .url-row{display:flex;align-items:center;gap:8px;margin-top:12px;}
  .url-text{flex:1;font-size:11px;color:#6b7a99;background:#f7f9fc;border:1px solid #dde3ef;border-radius:8px;padding:8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .copy-btn{background:#1a3a6b;color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;white-space:nowrap;}
  .copy-btn:active{background:#122d58;transform:scale(0.96);}
  .copy-btn.copied{background:#1a7a4a;}
  .footer{margin-top:24px;font-size:11px;color:#aab4c8;text-align:center;}
  .toast{position:fixed;left:50%;bottom:30px;transform:translateX(-50%);background:#1a7a4a;color:#fff;padding:12px 24px;border-radius:30px;font-weight:700;box-shadow:0 4px 16px rgba(0,0,0,0.25);opacity:0;transition:opacity 0.3s;pointer-events:none;}
  .toast.show{opacity:1;}
</style>
</head>
<body>
<div class="container">
  <h1>🥶 冷凍在庫システム</h1>

  <div class="app-block">
    <a class="app-link" href="count.html">
      📋 冷凍在庫表
      <div class="sub">在庫入力（小柏さん用）</div>
    </a>
    <div class="url-row">
      <div class="url-text" id="url-count">https://ahonokiki.github.io/freezer-app/count.html</div>
      <button class="copy-btn" data-target="url-count">コピー</button>
    </div>
  </div>

  <div class="app-block">
    <a class="app-link" href="order.html">
      📤 冷凍庫 発注メール
      <div class="sub">発注SMS生成（賢さん用）</div>
    </a>
    <div class="url-row">
      <div class="url-text" id="url-order">https://ahonokiki.github.io/freezer-app/order.html</div>
      <button class="copy-btn" data-target="url-order">コピー</button>
    </div>
  </div>

  <div class="footer">株式会社若林商店</div>
</div>

<div class="toast" id="toast">コピーしました</div>

<script>
document.querySelectorAll('.copy-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const text = document.getElementById(btn.dataset.target).textContent;
    const done = () => {
      btn.classList.add('copied');
      btn.textContent = '✓ 済';
      const t = document.getElementById('toast');
      t.classList.add('show');
      setTimeout(() => { btn.classList.remove('copied'); btn.textContent = 'コピー'; t.classList.remove('show'); }, 1800);
    };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(done).catch(() => fallback(text, done));
    } else { fallback(text, done); }
  });
});
function fallback(text, done){
  const ta = document.createElement('textarea');
  ta.value = text; ta.style.position='fixed'; ta.style.opacity='0';
  document.body.appendChild(ta); ta.select();
  try { document.execCommand('copy'); } catch(e){}
  document.body.removeChild(ta); done();
}
</script>
</body>
</html>
